name: Publish to NPM & JSR

on:
  release:
    types: [published]

jobs:
  publish-npm:
    name: "Publish to NPM"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      # Node 24 ships npm >= 11.5.1 (required for OIDC trusted publishing).
      # Do not run npm install -g npm@latest: it can break bundled deps (e.g. sigstore).
      # Do not set NODE_AUTH_TOKEN: OIDC must win over a placeholder token from setup-node.
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
          cache: pnpm
      - run: pnpm install
      - run: pnpm publish --access public --no-git-checks

  publish-jsr:
    name: "Publish to JSR"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: pnpm run publish:jsr

  docs:
    name: "Build Docs/Types and Deploy"
    runs-on: ubuntu-latest
    needs: [publish-npm]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false # otherwise, the token used is the GITHUB_TOKEN, instead of your personal token
          fetch-depth: 0 # otherwise, you will failed to push refs to dest repo
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - name: Create local changes
        run: |
          pnpm install
          pnpm run docs
          pnpm run monacoTypes
          rm -rf __tests__ src .github *.js *.json *.md *.MD
          rm -rf .editorconfig .eslintignore .eslintrc.js .npmignore .npmrc .prettierrc
          rm -rf pnpm-lock.yaml pnpm-workspace.yaml
          rm -rf assets
          mv docs/* .
          rm -rf docs/
          touch .nojekyll
          echo "js.sdk.tago.io" > CNAME
      - name: Commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "generated documentation"
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          force: true
