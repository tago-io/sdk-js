name: Units Tests

on: push

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        node-version: [22.x, 24.x]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          # Prefer reading packageManager from package.json when supported;
          # otherwise pin major 11 to match packageManager.
          version: 11

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run linter

      - name: Test
        run: pnpm test
        env:
          CI: true

      - name: Build
        run: pnpm run build
        env:
          CI: true
